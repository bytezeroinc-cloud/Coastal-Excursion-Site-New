kind = "web"
previewPath = "/"
title = "Low Coastal Country Excursion"
version = "1.0.0"
id = "artifacts/lowcoastal-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18232

[services.development]
run = "pnpm --filter @workspace/lowcoastal-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lowcoastal-website", "run", "build" ]
publicDir = "artifacts/lowcoastal-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18232"
BASE_PATH = "/"
